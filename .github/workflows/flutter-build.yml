name: "Flutter APK Build and Deploy"

on:
  push:
    branches:
      - main
    paths:
      - "mobile/**"
      - ".github/workflows/flutter-build.yml"
  workflow_dispatch: {}

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Setup Java"
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: "Setup Flutter"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0"
          channel: "stable"
          cache: true

      - name: "Create local.properties"
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > mobile/android/local.properties
          echo "sdk.dir=$ANDROID_HOME" >> mobile/android/local.properties

      - name: "Flutter pub get"
        working-directory: mobile
        run: flutter pub get

      - name: "Build APK"
        working-directory: mobile
        env:
          APP_URL: ${{ secrets.APP_URL }}
        run: flutter build apk --release --dart-define=APP_URL=$APP_URL

      - name: "Upload APK to R2 and register"
        env:
          APP_URL: ${{ secrets.APP_URL }}
          ADMIN_SECRET_KEY: ${{ secrets.ADMIN_SECRET_KEY }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          APK_PATH="mobile/build/app/outputs/flutter-apk/app-release.apk"
          FILENAME="stack-health-$(date +%Y%m%d-%H%M%S).apk"

          PRESIGN_RESPONSE=$(curl -sf -X POST \
            "${APP_URL}/api/v1/admin/app-links/upload-url" \
            -H "Content-Type: application/json" \
            -H "X-Admin-Key: ${ADMIN_SECRET_KEY}" \
            -d "{\"platform\":\"android\",\"filename\":\"${FILENAME}\",\"content_type\":\"application/vnd.android.package-archive\"}")

          UPLOAD_URL=$(echo "$PRESIGN_RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['upload_url'])")
          R2_KEY=$(echo "$PRESIGN_RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['r2_key'])")

          curl -sf -X PUT "$UPLOAD_URL" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary @"$APK_PATH"

          CDN_URL="${R2_PUBLIC_URL}/${R2_KEY}"
          echo "cdn_url=${CDN_URL}" >> "$GITHUB_OUTPUT"
          echo "filename=${FILENAME}" >> "$GITHUB_OUTPUT"

          curl -sf -X POST \
            "${APP_URL}/api/v1/admin/app-links/confirm-upload" \
            -H "Content-Type: application/json" \
            -H "X-Admin-Key: ${ADMIN_SECRET_KEY}" \
            -d "{\"platform\":\"android\",\"cdn_url\":\"${CDN_URL}\",\"filename\":\"${FILENAME}\"}"

          echo "APK registered: ${CDN_URL}"

      - name: "Upload APK artifact"
        uses: actions/upload-artifact@v4
        with:
          name: stack-health-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
