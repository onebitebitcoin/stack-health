name: "Flutter APK Build and Deploy"

on:
  push:
    branches:
      - main
    paths:
      - "mobile/**"
      - ".github/workflows/flutter-build.yml"
  workflow_dispatch: {}

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Setup Java"
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: "Setup Flutter"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0"
          channel: "stable"
          cache: true

      - name: "Create local.properties"
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > mobile/android/local.properties
          echo "sdk.dir=$ANDROID_HOME" >> mobile/android/local.properties

      - name: "Flutter pub get"
        working-directory: mobile
        run: flutter pub get

      - name: "Build APK"
        working-directory: mobile
        run: flutter build apk --release --dart-define=APP_URL=https://stackhealth.life

      - name: "Get version"
        id: version
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: "Delete existing release if exists"
        run: |
          gh release delete "v${{ steps.version.outputs.version }}-android" --yes 2>/dev/null || true
          git push --delete origin "v${{ steps.version.outputs.version }}-android" 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Create GitHub Release and upload APK"
        run: |
          gh release create "v${{ steps.version.outputs.version }}-android" \
            --title "Stack Health Android APK v${{ steps.version.outputs.version }}" \
            --notes "Stack Health Android 앱 APK 다운로드" \
            --latest \
            mobile/build/app/outputs/flutter-apk/app-release.apk#app-release.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Update APK URL in SettingsPage"
        run: |
          APK_URL="https://github.com/onebitebitcoin/stack-health/releases/download/v${{ steps.version.outputs.version }}-android/app-release.apk"
          sed -i "s|const ANDROID_APK_URL = '.*'|const ANDROID_APK_URL = '${APK_URL}'|" frontend/src/pages/SettingsPage.tsx
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add frontend/src/pages/SettingsPage.tsx
          git diff --cached --quiet || git commit -m "chore: Android APK URL 자동 업데이트 v${{ steps.version.outputs.version }}"
          git push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Upload APK artifact"
        uses: actions/upload-artifact@v4
        with:
          name: stack-health-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
