<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 배경 -->
  <rect width="1200" height="630" fill="#0D0D0D"/>

  <!-- 라임 글로우 -->
  <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 260) rotate(90) scale(440 600)">
    <stop stop-color="#B5FF2E" stop-opacity="0.18"/>
    <stop offset="1" stop-color="#B5FF2E" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- 카드 -->
  <rect x="60" y="55" width="1080" height="520" rx="40" fill="#161616" stroke="#2D2D2D" stroke-width="1.5"/>

  <!-- ── 로고: 아령 + 번개 (중앙 상단) ── -->
  <!-- 스케일 6x, 중앙 x=600 기준 (원본 너비 ~340px → 340*1=340, center offset 170) -->
  <g transform="translate(440 90)">
    <!-- 아령 왼쪽 핸들 -->
    <rect x="0" y="30" width="36" height="100" rx="12" fill="#B5FF2E"/>
    <!-- 아령 왼쪽 바 -->
    <rect x="36" y="55" width="70" height="36" rx="10" fill="#B5FF2E"/>
    <!-- 번개 (중앙) -->
    <path d="M185 0L148 90h40l-22 102 88-130h-42l32-62z" fill="#B5FF2E"/>
    <!-- 아령 오른쪽 바 -->
    <rect x="214" y="55" width="70" height="36" rx="10" fill="#B5FF2E"/>
    <!-- 아령 오른쪽 핸들 -->
    <rect x="284" y="30" width="36" height="100" rx="12" fill="#B5FF2E"/>
  </g>

  <!-- 브랜드명 -->
  <text x="600" y="330" fill="#F5F5F5" font-family="Inter, Pretendard, Apple SD Gothic Neo, sans-serif" font-size="72" font-weight="800" letter-spacing="-1.5" text-anchor="middle">Stack Health</text>

  <!-- 슬로건 -->
  <text x="600" y="400" fill="#B5FF2E" font-family="Inter, Pretendard, Apple SD Gothic Neo, sans-serif" font-size="38" font-weight="700" text-anchor="middle">운동하고 비트코인 받자</text>

  <!-- 설명 -->
  <text x="600" y="460" fill="#A1A1AA" font-family="Inter, Pretendard, Apple SD Gothic Neo, sans-serif" font-size="28" font-weight="400" text-anchor="middle">꾸준히 운동 기록하고 비트코인도 모으자</text>

  <!-- 하단 구분선 + 도메인 -->
  <line x1="200" y1="495" x2="1000" y2="495" stroke="#2D2D2D" stroke-width="1"/>
  <text x="600" y="532" fill="#52525B" font-family="Inter, Pretendard, sans-serif" font-size="22" font-weight="500" text-anchor="middle">stackhealth.app</text>
</svg>
